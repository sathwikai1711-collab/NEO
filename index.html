<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO — Master Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --mint: #3ecf8e; --mint-dark: #059669; --mint-light: #f0fdf4; --bg: #ffffff; --text-main: #111827; --text-sub: #6b7280; --border: #e5e7eb; --sidebar: #f9fafb; --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); background: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; }
        button { cursor: pointer; border: none; background: none; transition: 0.2s; }
        .auth-page { position: fixed; inset: 0; background: white; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .logo-orb { width: 80px; height: 80px; background: var(--mint); border-radius: 50%; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; box-shadow: 0 10px 30px rgba(62,207,142,0.3); }
        .login-btn { width: 100%; max-width: 300px; padding: 14px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 600; }
        .app-shell { display: none; height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1.5rem; }
        .main-content { flex: 1; display: flex; flex-direction: column; background: white; position: relative; }
        .top-nav { height: 64px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 2rem; justify-content: space-between; }
        .msg-area { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; }
        .msg-row { display: flex; flex-direction: column; max-width: 80%; }
        .msg-row.user { align-self: flex-end; }
        .msg-row.neo { align-self: flex-start; }
        .bubble { padding: 12px 16px; border-radius: 14px; font-size: 15px; line-height: 1.5; }
        .user .bubble { background: var(--mint); color: white; border-bottom-right-radius: 2px; }
        .neo .bubble { background: #f3f4f6; color: var(--text-main); border-bottom-left-radius: 2px; }
        .input-box { padding: 1.5rem; border-top: 1px solid var(--border); }
        .pill { background: #f9fafb; border: 1px solid var(--border); border-radius: 25px; display: flex; align-items: center; padding: 10px 20px; gap: 10px; }
        textarea { flex: 1; border: none; background: transparent; resize: none; outline: none; font-size: 15px; }
        #admin-panel { position: fixed; inset: 0; background: white; z-index: 20000; display: none; flex-direction: column; padding: 2rem; overflow-y: auto; }
        .user-log-card { border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; background: #fcfcfc; }
    </style>
</head>
<body>

    <div id="auth-page" class="auth-page">
        <div class="logo-orb">🛰</div>
        <h1 style="font-family: var(--font-display);">NEO Intelligence</h1>
        <p style="color: var(--text-sub); margin-bottom: 2rem;">Sign in to continue</p>
        <button class="login-btn" onclick="login()">Continue with Google</button>
        <div style="margin-top: 2rem; font-size: 12px; color: #ccc; cursor: pointer;" onclick="adminVerify()">Owner Override</div>
    </div>

    <div id="app-shell" class="app-shell">
        <aside class="sidebar">
            <div style="font-family: var(--font-display); font-size: 22px; font-weight: 800; margin-bottom: 2rem; color: var(--mint-dark);">NEO AI</div>
            <div style="flex: 1;">
                <div style="font-weight: 700; color: var(--mint-dark); margin-bottom: 15px; cursor: pointer;" onclick="switchTab('chat')">💬 Chat</div>
                <div style="font-weight: 600; color: var(--text-sub); cursor: pointer;" onclick="switchTab('groups')">👥 Groups</div>
            </div>
            <div style="border-top: 1px solid var(--border); padding-top: 1rem;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <img id="user-photo" src="" style="width: 32px; height: 32px; border-radius: 50%; background: #eee;">
                    <div style="font-size: 13px; font-weight: 700;" id="user-name">User</div>
                </div>
                <button onclick="logout()" style="font-size: 11px; color: red; margin-top: 10px;">Sign Out</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <div id="tab-title" style="font-weight: 800;">Personal Chat</div>
                <div id="admin-btn" style="display:none; background: black; color: var(--mint); padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 800; cursor: pointer;" onclick="showAdmin()">OWNER DASHBOARD</div>
            </header>
            <div class="msg-area" id="chat-box"></div>
            <div class="input-box">
                <div class="pill">
                    <textarea id="user-input" placeholder="Ask NEO..." rows="1"></textarea>
                    <button onclick="handleSend()" style="background: var(--mint); color: white; width: 32px; height: 32px; border-radius: 50%;">➤</button>
                </div>
            </div>
        </main>
    </div>

    <div id="admin-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1 style="font-family: var(--font-display);">Global Monitor (Sathwik)</h1>
            <button onclick="document.getElementById('admin-panel').style.display='none'">✕ CLOSE</button>
        </div>
        <div id="admin-feed"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBiApVGaJBbzIXoevwuP3bBOFliI3YPEBw",
            authDomain: "neos-cf4f1.firebaseapp.com",
            projectId: "neos-cf4f1",
            storageBucket: "neos-cf4f1.appspot.com",
            messagingSenderId: "1021422287779",
            appId: "1:1021422287779:web:fa88729d41c6fd5f75f816"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const GEMINI_KEY = "AIzaSyBiApVGaJBbzIXoevwuP3bBOFliI3YPEBw";

        let currentUser = null;
        let activeTab = 'chat';
        const SATHWIK_EMAIL = "elukasathwik4@gmail.com";

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('app-shell').style.display = 'flex';
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-photo').src = user.photoURL;
                if (user.email === SATHWIK_EMAIL) document.getElementById('admin-btn').style.display = 'block';
                loadMessages();
            } else {
                document.getElementById('auth-page').style.display = 'flex';
                document.getElementById('app-shell').style.display = 'none';
            }
        });

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut(); }
        function adminVerify() { if(prompt("Password:") === "Vaishuu@#123") login(); }

        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('tab-title').innerText = tab === 'chat' ? 'Personal Chat' : 'Group Space';
            loadMessages();
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;
            input.value = "";

            const msgData = {
                uid: currentUser.uid,
                email: currentUser.email,
                name: currentUser.displayName,
                content: text,
                role: 'user',
                tab: activeTab,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            const docRef = await db.collection("messages").add(msgData);

            if (activeTab === 'chat' || text.toLowerCase().includes('@neo')) {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                }).then(r => r.json());
                
                const aiText = res.candidates[0].content.parts[0].text;
                await docRef.update({ aiResponse: aiText });
            }
        }

        function loadMessages() {
            db.collection("messages")
              .where("tab", "==", activeTab)
              .orderBy("createdAt", "asc")
              .onSnapshot(snap => {
                  const box = document.getElementById('chat-box');
                  box.innerHTML = "";
                  snap.forEach(doc => {
                      const d = doc.data();
                      // Only show personal chats to the owner of the chat
                      if (activeTab === 'chat' && d.uid !== currentUser.uid) return;
                      
                      box.innerHTML += `<div class="msg-row user"><div class="bubble">${d.content}</div></div>`;
                      if (d.aiResponse) {
                          box.innerHTML += `<div class="msg-row neo"><div class="bubble">${d.aiResponse}</div></div>`;
                      }
                  });
                  box.scrollTop = box.scrollHeight;
              });
        }

        function showAdmin() {
            document.getElementById('admin-panel').style.display = 'flex';
            db.collection("messages").orderBy("createdAt", "desc").onSnapshot(snap => {
                const feed = document.getElementById('admin-feed');
                feed.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    feed.innerHTML += `<div class="user-log-card">
                        <strong>${d.email} (${d.tab})</strong><br>
                        Q: ${d.content}<br>
                        A: ${d.aiResponse || '...'}
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
